<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .brand-logo { font-size: 2rem; font-weight: 800; color: #e94560; letter-spacing: -1px; }
        .btn-primary { background: #e94560; border-color: #e94560; }
        .btn-primary:hover { background: #c73652; border-color: #c73652; }
        .form-control:focus { border-color: #e94560; box-shadow: 0 0 0 0.2rem rgba(233,69,96,.25); }
        .divider { border-color: rgba(0,0,0,.1); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-6 col-lg-4">
            <div class="card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="brand-logo">HanSung</div>
                        <p class="text-muted mt-1 mb-0">Spring Security 실습 프로젝트</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger py-2 text-center" role="alert">
                        이메일 또는 비밀번호가 올바르지 않습니다.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-info py-2 text-center" role="alert">
                        로그아웃 되었습니다.
                    </div>
                    <div th:if="${param.registered}" class="alert alert-success py-2 text-center" role="alert">
                        회원가입이 완료되었습니다. 로그인해 주세요.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">이메일</label>
                            <input type="email" name="username" class="form-control form-control-lg"
                                   placeholder="example@hansung.ac.kr" required autofocus/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">비밀번호</label>
                            <input type="password" name="password" class="form-control form-control-lg"
                                   placeholder="비밀번호 입력" required/>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100 fw-semibold">로그인</button>
                    </form>

                    <hr class="divider my-4">
                    <p class="text-center text-muted mb-0">
                        계정이 없으신가요?
                        <a th:href="@{/signup}" class="text-decoration-none fw-semibold" style="color:#e94560">회원가입</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<footer style="text-align:center; padding:16px; margin-top:40px; border-top:1px solid #ddd; font-size:14px; color:#555;">
    실습 수행 일시: <span id="footer-time"></span>
    &nbsp;│&nbsp; 학번: 2371404
    &nbsp;│&nbsp; 성명: 허성준
</footer>

<script>
    function updateTime() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const MM = String(now.getMonth()+1).padStart(2,'0');
        const dd = String(now.getDate()).padStart(2,'0');
        const days = ['일','월','화','수','목','금','토'];
        const day = days[now.getDay()];
        const hh = String(now.getHours()).padStart(2,'0');
        const mm = String(now.getMinutes()).padStart(2,'0');
        const ss = String(now.getSeconds()).padStart(2,'0');
        document.getElementById('footer-time').textContent =
            `${yyyy}년 ${MM}월 ${dd}일 (${day}) ${hh}:${mm}:${ss}`;
    }
    updateTime();
    setInterval(updateTime, 1000);
</script>
</body>
</html>
