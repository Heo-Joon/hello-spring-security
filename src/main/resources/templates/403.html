<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>접근 거부 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    </div>
</nav>
<div class="container text-center mt-5">
    <h1 class="display-1 fw-bold text-danger">403</h1>
    <h4 class="mb-3">접근이 거부되었습니다</h4>
    <p class="text-muted">관리자(ADMIN) 권한이 필요한 페이지입니다.</p>
    <a th:href="@{/products}" class="btn btn-danger px-4">상품 목록으로 돌아가기</a>
</div>

<footer style="text-align:center; padding:16px; margin-top:40px; border-top:1px solid #ddd; font-size:14px; color:#555;">
    실습 수행 일시: <span id="footer-time"></span>
    &nbsp;│&nbsp; 학번: 2371404
    &nbsp;│&nbsp; 성명: 허성준
</footer>
<script>
    function updateTime() {
        const now = new Date();
        const yyyy = now.getFullYear();
        const MM = String(now.getMonth()+1).padStart(2,'0');
        const dd = String(now.getDate()).padStart(2,'0');
        const days = ['일','월','화','수','목','금','토'];
        const day = days[now.getDay()];
        const hh = String(now.getHours()).padStart(2,'0');
        const mm = String(now.getMinutes()).padStart(2,'0');
        const ss = String(now.getSeconds()).padStart(2,'0');
        document.getElementById('footer-time').textContent =
            `${yyyy}년 ${MM}월 ${dd}일 (${day}) ${hh}:${mm}:${ss}`;
    }
    updateTime();
    setInterval(updateTime, 1000);
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
